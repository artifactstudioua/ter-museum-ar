<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Музей — Експонати</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;1,500&display=swap" rel="stylesheet" />

  <script src="data.js"></script>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f8f5f0;
      --bg2:        #f0ebe3;
      --white:      #ffffff;
      --gold:       #b38b24;
      --gold-light: #d4a93a;
      --gold-pale:  #f5edda;
      --text:       #1a1410;
      --text-2:     #5a5248;
      --text-3:     #9a9088;
      --border:     #e4ddd3;
      --shadow:     0 2px 16px rgba(60,40,10,.07);
      --shadow-lg:  0 8px 40px rgba(60,40,10,.13);
      --radius:     20px;
      --radius-sm:  12px;
      --tr:         .28s cubic-bezier(.4,0,.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    .hidden { display: none !important; }

    /* ══ HEADER ══ */
    header {
      position: sticky; top: 0; z-index: 200;
      background: rgba(248,245,240,.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      height: 60px;
      display: flex; align-items: center;
      padding: 0 clamp(1rem, 4vw, 2rem);
      gap: 1rem;
    }

    .header-logo {
      display: flex; align-items: center; gap: .65rem;
      text-decoration: none; color: inherit;
      flex-shrink: 0; cursor: pointer;
    }
    .header-logo-icon {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .header-logo-name {
      font-size: .88rem; font-weight: 700; color: var(--text); display: block; line-height: 1.2;
    }
    .header-logo-sub {
      font-size: .6rem; font-weight: 400; color: var(--text-3);
      letter-spacing: .1em; text-transform: uppercase; display: block;
    }

    .header-spacer { flex: 1; }

    .header-exhibit-title {
      font-size: .85rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px;
    }

    /* ══ HOME PAGE ══ */
    #page-home { padding: 1.5rem clamp(1rem, 4vw, 2rem) 3rem; }

    .section-label {
      font-size: .68rem; font-weight: 700; letter-spacing: .2em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 1.25rem;
    }

    .exhibits-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: clamp(.75rem, 3vw, 1.25rem);
    }
    @media (min-width: 600px)  { .exhibits-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 900px)  { .exhibits-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 1200px) { .exhibits-grid { grid-template-columns: repeat(5, 1fr); } }

    /* Card */
    .exhibit-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 5/7;
      display: flex; flex-direction: column;
      border: 1.5px solid transparent;
      opacity: 0;
      animation: cardIn .42s cubic-bezier(.4,0,.2,1) forwards;
      transition: transform var(--tr), box-shadow var(--tr), border-color var(--tr);
    }
    .exhibit-card:hover {
      transform: translateY(-4px) scale(1.015);
      box-shadow: var(--shadow-lg);
      border-color: var(--gold);
    }
    .exhibit-card:hover .card-arrow {
      background: var(--gold); color: #fff; transform: translateX(2px);
    }
    .exhibit-card:hover .card-img img { transform: scale(1.05); }

    .card-img {
      flex: 1; overflow: hidden; position: relative;
      background: var(--bg2);
    }
    .card-img img {
      width: 100%; height: 100%;
      object-fit: contain;
      padding: 8px;
      display: block;
      transition: transform .45s cubic-bezier(.4,0,.2,1);
    }
    .card-img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; color: var(--text-3);
    }
    .card-num {
      position: absolute; top: 10px; left: 10px;
      background: var(--white); color: var(--text-2);
      font-size: .6rem; font-weight: 700;
      padding: .2rem .5rem; border-radius: 6px;
      box-shadow: 0 1px 6px rgba(0,0,0,.1);
    }

    .card-body {
      padding: .7rem .85rem .75rem;
      display: flex; align-items: flex-end; justify-content: space-between; gap: .5rem;
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .card-name {
      font-size: clamp(.7rem, 1.8vw, .85rem); font-weight: 600;
      line-height: 1.3; color: var(--text); flex: 1;
    }
    .card-arrow {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--bg2); color: var(--gold); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: var(--tr);
    }
    .card-arrow svg { width: 13px; height: 13px; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══ EXHIBIT PAGE ══ */
    #page-exhibit { min-height: calc(100dvh - 60px); }

    .back-bar {
      padding: 1rem clamp(1rem, 4vw, 2rem) .5rem;
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: .45rem;
      background: var(--white);
      border: 1.5px solid var(--border);
      color: var(--text-2);
      font-family: 'Manrope', sans-serif;
      font-size: .78rem; font-weight: 600;
      padding: .5rem 1rem .5rem .75rem;
      border-radius: 30px; cursor: pointer;
      box-shadow: var(--shadow);
      transition: var(--tr);
    }
    .btn-back:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-pale); }
    .btn-back svg { width: 15px; height: 15px; }

    .exhibit-inner {
      padding: 0 clamp(1rem, 4vw, 2rem) 3rem;
      display: flex; flex-direction: column; gap: 1.5rem;
    }
    @media (min-width: 768px) {
      .exhibit-inner {
        flex-direction: row; align-items: flex-start;
        gap: clamp(1.5rem, 4vw, 3rem);
        max-width: 1100px; margin: 0 auto;
      }
      .exhibit-left  { flex: 0 0 42%; display: flex; flex-direction: column; }
      .exhibit-right { flex: 1; padding-top: .25rem; }
    }

    .exhibit-num {
      font-size: .68rem; font-weight: 700; letter-spacing: .2em;
      text-transform: uppercase; color: var(--text-3); margin-bottom: .4rem;
    }
    .exhibit-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 600; line-height: 1.15;
      color: var(--text); margin-bottom: 1rem;
    }

    .viewer-wrap {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1.5px solid var(--border);
      /* padding-bottom trick: forces 3/4 aspect ratio on mobile */
      position: relative;
      width: 95%;
      margin: 0 auto;
      padding-bottom: calc(95% * 4 / 3);
      height: 0;
    }
    @media (min-width: 768px) {
      .viewer-wrap {
        width: 100%;
        margin: 0;
        padding-bottom: 0;
        height: auto;
        /* on desktop: fill the right column height via align-items stretch */
        align-self: stretch;
        display: flex;
        flex-direction: column;
      }
    }

    model-viewer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
      background: var(--bg2);
      --poster-color: transparent;
    }
    @media (min-width: 768px) {
      model-viewer {
        position: relative;
        top: auto; left: auto;
        width: 100%;
        flex: 1;
        min-height: 400px;
      }
    }

    .viewer-hint {
      position: absolute; bottom: .75rem; right: .75rem;
      background: rgba(255,255,255,.88); backdrop-filter: blur(8px);
      border: 1px solid var(--border); border-radius: 8px;
      font-size: .6rem; font-weight: 600; color: var(--text-2);
      padding: .25rem .6rem;
      display: flex; align-items: center; gap: .3rem;
      pointer-events: none;
    }
    .viewer-hint svg { width: 11px; height: 11px; color: var(--gold); }

    .btn-ar {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: .65rem;
      background: var(--gold); color: #fff;
      font-family: 'Manrope', sans-serif;
      font-size: .9rem; font-weight: 700;
      padding: .95rem 1.5rem;
      border-radius: var(--radius); border: none; cursor: pointer;
      box-shadow: 0 4px 20px rgba(179,139,36,.35);
      margin-top: .85rem;
      transition: var(--tr);
    }
    .btn-ar:hover {
      background: var(--gold-light);
      box-shadow: 0 6px 28px rgba(179,139,36,.5);
      transform: translateY(-1px);
    }
    .btn-ar:active { transform: translateY(0); }
    .btn-ar svg { width: 20px; height: 20px; flex-shrink: 0; }
    .btn-ar-soon {
      margin-left: auto;
      background: rgba(255,255,255,.22);
      font-size: .6rem; letter-spacing: .1em;
      padding: .18rem .5rem; border-radius: 20px;
    }

    .divider { height: 1px; background: var(--border); margin: 1rem 0; }

    .info-block {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: .9rem 1.1rem;
      margin-bottom: 1rem;
    }
    .info-block-label {
      font-size: .63rem; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: .6rem;
      display: flex; align-items: center; gap: .4rem;
    }
    .info-block-label svg { width: 12px; height: 12px; }

    audio {
      width: 100%; height: 34px;
      border-radius: 8px; accent-color: var(--gold);
    }

    .desc-label {
      font-size: .63rem; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; color: var(--text-3); margin-bottom: .6rem;
    }
    .desc-text {
      font-size: clamp(.88rem, 2vw, .95rem);
      font-weight: 400; color: var(--text-2); line-height: 1.78;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-logo" id="logo-btn" role="button" tabindex="0" aria-label="На головну">
      <div class="header-logo-icon">🪆</div>
      <div>
        <span class="header-logo-name">Музей</span>
        <span class="header-logo-sub">Колекція</span>
      </div>
    </div>
    <div class="header-spacer"></div>
    <span class="header-exhibit-title hidden" id="header-exhibit-title"></span>
  </header>

  <!-- HOME -->
  <main id="page-home">
    <p class="section-label">Всі експонати</p>
    <div class="exhibits-grid" id="exhibits-grid"></div>
  </main>

  <!-- EXHIBIT -->
  <section id="page-exhibit" class="hidden">
    <div class="back-bar">
      <button class="btn-back" id="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Назад
      </button>
    </div>

    <div class="exhibit-inner">

      <!-- LEFT -->
      <div class="exhibit-left">
        <div class="viewer-wrap">
          <model-viewer id="model-viewer" auto-rotate camera-controls
            shadow-intensity="0.6" environment-image="neutral" exposure="1"
            alt="3D-модель експоната"></model-viewer>
          <span class="viewer-hint">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
            </svg>
            Перетягніть для огляду
          </span>
        </div>

        <button class="btn-ar" id="btn-ar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
            <line x1="12" y1="22.08" x2="12" y2="12"/>
          </svg>
          Дивитись в AR
          <span class="btn-ar-soon">Скоро</span>
        </button>
      </div>

      <!-- RIGHT -->
      <div class="exhibit-right">
        <p class="exhibit-num" id="exhibit-num">Експонат</p>
        <h1 class="exhibit-title" id="exhibit-name"></h1>

        <div class="divider"></div>

        <!-- Audio -->
        <div class="info-block">
          <div class="info-block-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
            Аудіогід
          </div>
          <audio id="audio-player" controls preload="none">
            <source id="audio-source" src="" type="audio/mpeg" />
          </audio>
        </div>

        <!-- Description -->
        <p class="desc-label">Опис</p>
        <p class="desc-text" id="exhibit-desc"></p>
      </div>
    </div>
  </section>

  <script>
    const pageHome    = document.getElementById('page-home');
    const pageExhibit = document.getElementById('page-exhibit');
    const grid        = document.getElementById('exhibits-grid');

    // ── Render grid ──────────────────────────────
    function renderGrid() {
      grid.innerHTML = '';
      (exhibitsData || []).forEach((item, idx) => {
        const card = document.createElement('article');
        card.className = 'exhibit-card';
        card.style.animationDelay = `${idx * 55}ms`;
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');
        card.setAttribute('aria-label', item.name);

        card.innerHTML = `
          <div class="card-img">
            ${item.imageUrl
              ? `<img src="${item.imageUrl}" alt="${item.name}" loading="lazy">`
              : `<div class="card-img-placeholder">🏺</div>`}
            <span class="card-num">№ ${String(idx+1).padStart(2,'0')}</span>
          </div>
          <div class="card-body">
            <span class="card-name">${item.name}</span>
            <span class="card-arrow">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </span>
          </div>
        `;

        const open = () => navigate(item.id);
        card.addEventListener('click', open);
        card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') open(); });
        grid.appendChild(card);
      });
    }

    // ── Navigate ─────────────────────────────────
    function navigate(id) {
      const url = new URL(window.location.href);
      url.searchParams.set('id', id);
      history.pushState({ id }, '', url.toString());
      openExhibit(id);
    }

    function openExhibit(id) {
      const item = (exhibitsData || []).find(e => String(e.id) === String(id));
      if (!item) return;
      const idx = exhibitsData.indexOf(item);

      document.getElementById('exhibit-num').textContent  = `Експонат № ${String(idx+1).padStart(2,'0')}`;
      document.getElementById('exhibit-name').textContent = item.name;
      document.getElementById('exhibit-desc').textContent = item.description || 'Опис відсутній.';
      document.getElementById('model-viewer').src = item.modelUrl || '';
      document.getElementById('model-viewer').alt = item.name;
      document.getElementById('audio-source').src = item.audioUrl || '';
      document.getElementById('audio-player').load();

      const title = document.getElementById('header-exhibit-title');
      title.textContent = item.name;
      title.classList.remove('hidden');

      document.getElementById('btn-ar').onclick =
        () => window.location.href = `ar.html?id=${item.id}`;

      pageHome.classList.add('hidden');
      pageExhibit.classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── Go home ───────────────────────────────────
    function goHome() {
      document.getElementById('audio-player').pause();
      document.getElementById('header-exhibit-title').classList.add('hidden');

      const url = new URL(window.location.href);
      url.searchParams.delete('id');
      history.pushState({}, '', url.toString());

      pageExhibit.classList.add('hidden');
      pageHome.classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.getElementById('back-btn').addEventListener('click', goHome);

    const logoBtn = document.getElementById('logo-btn');
    logoBtn.addEventListener('click', goHome);
    logoBtn.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') goHome(); });

    window.addEventListener('popstate', () => {
      const id = new URLSearchParams(window.location.search).get('id');
      if (id) { openExhibit(id); }
      else {
        document.getElementById('audio-player').pause();
        document.getElementById('header-exhibit-title').classList.add('hidden');
        pageExhibit.classList.add('hidden');
        pageHome.classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });

    // ── Init ─────────────────────────────────────
    renderGrid();
    const initId = new URLSearchParams(window.location.search).get('id');
    if (initId) openExhibit(initId);
  </script>
</body>
</html>
