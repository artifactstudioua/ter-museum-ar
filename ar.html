<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR — Музей</title>

  <!-- A-Frame 1.4.2 -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- Mind-AR (image tracking) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <!-- Data -->
  <script src="data.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:      #b38b24;
      --gold-lite: #d4a93a;
      --gold-pale: rgba(179,139,36,.15);
      --white:     #ffffff;
      --bg:        #f8f5f0;
      --text:      #1a1410;
      --text-2:    #5a5248;
      --radius:    18px;
      --tr:        .28s cubic-bezier(.4,0,.2,1);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Manrope', sans-serif;
      background: #000;
    }

    /* A-Frame canvas */
    a-scene { display: block; width: 100%; height: 100%; }

    /* ══ BACK BUTTON ══ */
    #btn-back {
      position: fixed;
      top: clamp(12px, 3vw, 20px);
      left: clamp(12px, 3vw, 20px);
      z-index: 999;
      display: flex; align-items: center; gap: .45rem;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,.6);
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      font-size: .8rem; font-weight: 600;
      padding: .5rem 1rem .5rem .7rem;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 2px 16px rgba(0,0,0,.18);
      transition: var(--tr);
      text-decoration: none;
    }
    #btn-back:hover {
      background: var(--white);
      border-color: var(--gold);
      color: var(--gold);
    }
    #btn-back svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* ══ EXHIBIT BADGE (shown when target found) ══ */
    #exhibit-badge {
      position: fixed;
      bottom: clamp(24px, 5vw, 40px);
      left: 50%; transform: translateX(-50%);
      z-index: 999;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(14px);
      border: 1.5px solid rgba(255,255,255,.5);
      border-radius: var(--radius);
      padding: .75rem 1.25rem;
      text-align: center;
      min-width: 200px;
      box-shadow: 0 8px 32px rgba(0,0,0,.2);
      opacity: 0;
      transform: translateX(-50%) translateY(12px);
      transition: opacity .4s ease, transform .4s ease;
      pointer-events: none;
    }
    #exhibit-badge.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #badge-num {
      font-size: .6rem; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; color: var(--gold); margin-bottom: .2rem;
    }
    #badge-name {
      font-size: .95rem; font-weight: 700; color: var(--text);
    }
    #badge-audio-icon {
      display: flex; align-items: center; justify-content: center; gap: .3rem;
      margin-top: .35rem;
      font-size: .62rem; font-weight: 500; color: var(--text-2);
    }
    #badge-audio-icon svg { width: 11px; height: 11px; color: var(--gold); }

    /* ══ OVERLAY ══ */
    #overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem;
      transition: opacity .5s ease;
    }
    #overlay.hiding {
      opacity: 0;
      pointer-events: none;
    }

    .overlay-logo {
      width: 60px; height: 60px; border-radius: 50%;
      background: var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 20px rgba(179,139,36,.4);
    }

    .overlay-eyebrow {
      font-size: .65rem; font-weight: 700; letter-spacing: .22em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: .6rem;
    }

    .overlay-title {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: 800; color: var(--text);
      text-align: center; line-height: 1.2;
      margin-bottom: .75rem;
    }

    .overlay-exhibit-name {
      font-size: clamp(1rem, 3vw, 1.3rem);
      font-weight: 500; color: var(--text-2);
      text-align: center;
      margin-bottom: 2.5rem;
      max-width: 320px;
      line-height: 1.4;
    }

    /* Instruction card */
    .overlay-instruction {
      background: var(--white);
      border: 1.5px solid #e4ddd3;
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 2rem;
      max-width: 320px; width: 100%;
      display: flex; flex-direction: column; gap: .65rem;
    }
    .instr-row {
      display: flex; align-items: center; gap: .75rem;
    }
    .instr-num {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--gold-pale);
      border: 1.5px solid rgba(179,139,36,.3);
      color: var(--gold);
      font-size: .72rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .instr-text {
      font-size: .8rem; font-weight: 500; color: var(--text-2);
      line-height: 1.35;
    }

    /* Start button */
    #btn-start {
      width: 100%; max-width: 320px;
      display: flex; align-items: center; justify-content: center; gap: .65rem;
      background: var(--gold);
      color: #fff;
      font-family: 'Manrope', sans-serif;
      font-size: 1rem; font-weight: 700;
      padding: 1rem 2rem;
      border-radius: 50px;
      border: none; cursor: pointer;
      box-shadow: 0 6px 24px rgba(179,139,36,.45);
      transition: var(--tr);
    }
    #btn-start:hover {
      background: var(--gold-lite);
      box-shadow: 0 8px 32px rgba(179,139,36,.6);
      transform: translateY(-1px);
    }
    #btn-start:active { transform: translateY(0); }
    #btn-start svg { width: 20px; height: 20px; }

    /* ══ ERROR SCREEN ══ */
    #error-screen {
      position: fixed; inset: 0; z-index: 2000;
      background: var(--bg);
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem; text-align: center; gap: 1rem;
    }
    #error-screen.visible { display: flex; }
    #error-screen h2 { font-size: 1.4rem; font-weight: 700; color: var(--text); }
    #error-screen p  { font-size: .9rem; color: var(--text-2); max-width: 300px; line-height: 1.6; }
    .btn-error-back {
      display: inline-flex; align-items: center; gap: .45rem;
      background: var(--white); border: 1.5px solid #e4ddd3;
      color: var(--text-2); font-family: 'Manrope', sans-serif;
      font-size: .82rem; font-weight: 600;
      padding: .6rem 1.2rem; border-radius: 30px; cursor: pointer;
      text-decoration: none; margin-top: .5rem;
      transition: var(--tr);
    }
    .btn-error-back:hover { border-color: var(--gold); color: var(--gold); }
  </style>
</head>
<body>

  <!-- ══ ERROR SCREEN ══ -->
  <div id="error-screen">
    <div style="font-size:3rem">⚠️</div>
    <h2>Помилка</h2>
    <p id="error-msg">Експонат не знайдено.</p>
    <a href="index.html" class="btn-error-back">
      ← Повернутись до колекції
    </a>
  </div>

  <!-- ══ OVERLAY (shown before AR starts) ══ -->
  <div id="overlay">
    <div class="overlay-logo">🪆</div>
    <p class="overlay-eyebrow">Доповнена реальність</p>
    <h1 class="overlay-title">AR-перегляд</h1>
    <p class="overlay-exhibit-name" id="overlay-exhibit-name">Завантаження…</p>

    <div class="overlay-instruction">
      <div class="instr-row">
        <span class="instr-num">1</span>
        <span class="instr-text">Дозвольте доступ до камери</span>
      </div>
      <div class="instr-row">
        <span class="instr-num">2</span>
        <span class="instr-text">Наведіть камеру на листівку експоната</span>
      </div>
      <div class="instr-row">
        <span class="instr-num">3</span>
        <span class="instr-text">Дочекайтесь появи 3D-моделі та звуку</span>
      </div>
    </div>

    <button id="btn-start">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
      </svg>
      Запустити AR
    </button>
  </div>

  <!-- ══ BACK BUTTON ══ -->
  <a href="index.html" id="btn-back" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Назад
  </a>

  <!-- ══ EXHIBIT BADGE ══ -->
  <div id="exhibit-badge">
    <p id="badge-num"></p>
    <p id="badge-name"></p>
    <div id="badge-audio-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
      Аудіогід відтворюється
    </div>
  </div>

  <!-- Hidden audio element -->
  <audio id="ar-audio" loop preload="auto">
    <source id="ar-audio-src" src="" type="audio/mpeg" />
  </audio>

  <!-- ══ A-FRAME SCENE (built dynamically) ══ -->
  <div id="scene-container"></div>

  <script>
    // ─────────────────────────────────────────────
    // 1. Get exhibit from URL
    // ─────────────────────────────────────────────
    const params  = new URLSearchParams(window.location.search);
    const rawId   = params.get('id');
    const exhibit = (exhibitsData || []).find(e => String(e.id) === String(rawId));

    function showError(msg) {
      document.getElementById('overlay').style.display = 'none';
      const err = document.getElementById('error-screen');
      document.getElementById('error-msg').textContent = msg;
      err.classList.add('visible');
    }

    if (!rawId || !exhibit) {
      showError('Експонат не знайдено. Перевірте посилання.');
    } else {
      initAR();
    }

    // ─────────────────────────────────────────────
    // 2. Init
    // ─────────────────────────────────────────────
    function initAR() {
      const idx = exhibitsData.indexOf(exhibit);

      // Populate overlay
      document.getElementById('overlay-exhibit-name').textContent = exhibit.name;

      // Populate badge
      document.getElementById('badge-num').textContent =
        `Експонат № ${String(idx + 1).padStart(2, '0')}`;
      document.getElementById('badge-name').textContent = exhibit.name;

      // Set audio source
      const audioEl = document.getElementById('ar-audio');
      document.getElementById('ar-audio-src').src = exhibit.audioUrl || '';
      audioEl.load();

      // Build the A-Frame scene string
      const targetIndex = exhibit.targetIndex !== undefined ? exhibit.targetIndex : idx;
      const modelUrl    = exhibit.modelUrl || '';

      const sceneHTML = `
        <a-scene
          id="ar-scene"
          mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
          color-space="sRGB"
          renderer="colorManagement: true; physicallyCorrectLights: true"
          vr-mode-ui="enabled: false"
          device-orientation-permission-ui="enabled: false"
        >
          <a-assets>
            <a-asset-item id="exhibit-model" src="${modelUrl}"></a-asset-item>
          </a-assets>

          <!-- Lighting for RealityScan models -->
          <a-light type="ambient"     color="#ffffff" intensity="0.6"></a-light>
          <a-light type="directional" color="#fff8ee" intensity="1.4"
                   position="1 3 2"></a-light>
          <a-light type="directional" color="#ddeeff" intensity="0.4"
                   position="-2 1 -1"></a-light>

          <!-- Camera -->
          <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

          <!-- AR Target -->
          <a-entity mindar-image-target="targetIndex: ${targetIndex}" id="ar-target">
            <a-gltf-model
              id="ar-model"
              src="#exhibit-model"
              rotation="0 0 0"
              position="0 0 0.05"
              scale="0.15 0.15 0.15"
              animation="property: rotation;
                         to: 0 360 0;
                         loop: true;
                         dur: 8000;
                         easing: linear"
            ></a-gltf-model>
          </a-entity>
        </a-scene>
      `;

      document.getElementById('scene-container').innerHTML = sceneHTML;

      // Wait for scene to be ready, then set up events
      const scene = document.getElementById('ar-scene');

      scene.addEventListener('loaded', () => {
        setupAREvents();
      });
    }

    // ─────────────────────────────────────────────
    // 3. AR Events
    // ─────────────────────────────────────────────
    function setupAREvents() {
      const target  = document.getElementById('ar-target');
      const audioEl = document.getElementById('ar-audio');
      const badge   = document.getElementById('exhibit-badge');

      if (!target) return;

      target.addEventListener('targetFound', () => {
        audioEl.play().catch(() => {});
        badge.classList.add('visible');
      });

      target.addEventListener('targetLost', () => {
        audioEl.pause();
        badge.classList.remove('visible');
      });
    }

    // ─────────────────────────────────────────────
    // 4. Start button
    // ─────────────────────────────────────────────
    document.getElementById('btn-start').addEventListener('click', () => {
      const overlay = document.getElementById('overlay');
      const scene   = document.getElementById('ar-scene');
      const audioEl = document.getElementById('ar-audio');
      const backBtn = document.getElementById('btn-back');

      // Unlock audio context (required by browsers for autoplay policy)
      audioEl.play().then(() => { audioEl.pause(); audioEl.currentTime = 0; }).catch(() => {});

      // Hide overlay
      overlay.classList.add('hiding');
      setTimeout(() => { overlay.style.display = 'none'; }, 500);

      // Show back button
      backBtn.style.display = 'flex';

      // Start Mind-AR
      if (scene && scene.systems && scene.systems['mindar-image-system']) {
        scene.systems['mindar-image-system'].start();
      } else {
        // Fallback: wait a tick and retry
        scene.addEventListener('loaded', () => {
          if (scene.systems['mindar-image-system']) {
            scene.systems['mindar-image-system'].start();
          }
        }, { once: true });
      }
    });

    // ─────────────────────────────────────────────
    // 5. Back button — stop AR cleanly
    // ─────────────────────────────────────────────
    document.getElementById('btn-back').addEventListener('click', (e) => {
      e.preventDefault();
      const audioEl = document.getElementById('ar-audio');
      audioEl.pause();
      const scene = document.getElementById('ar-scene');
      if (scene && scene.systems && scene.systems['mindar-image-system']) {
        scene.systems['mindar-image-system'].stop();
      }
      // Navigate back: preserve exhibit id
      const id = new URLSearchParams(window.location.search).get('id');
      window.location.href = id ? `index.html?id=${id}` : 'index.html';
    });
  </script>
</body>
</html>
