<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR — Музей</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="data.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:      #b38b24;
      --gold-lite: #d4a93a;
      --gold-pale: rgba(179,139,36,.15);
      --white:     #ffffff;
      --bg:        #f8f5f0;
      --text:      #1a1410;
      --text-2:    #5a5248;
      --radius:    18px;
      --tr:        .28s cubic-bezier(.4,0,.2,1);
    }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Manrope', sans-serif;
      background: transparent;
    }

    /* Do NOT touch a-scene — Mind-AR owns it */

    /* Ensure Mind-AR's injected video is always visible */
    video { display: block !important; }

    #btn-back {
      position: fixed;
      top: clamp(12px, 3vw, 20px);
      left: clamp(12px, 3vw, 20px);
      z-index: 9990;
      display: none;
      align-items: center; gap: .45rem;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,.6);
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      font-size: .8rem; font-weight: 600;
      padding: .5rem 1rem .5rem .7rem;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 2px 16px rgba(0,0,0,.18);
      text-decoration: none;
    }
    #btn-back svg { width: 15px; height: 15px; flex-shrink: 0; }

    #exhibit-badge {
      position: fixed;
      bottom: clamp(24px, 5vw, 40px);
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      z-index: 9990;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(14px);
      border: 1.5px solid rgba(255,255,255,.5);
      border-radius: var(--radius);
      padding: .75rem 1.25rem;
      text-align: center;
      min-width: 200px;
      box-shadow: 0 8px 32px rgba(0,0,0,.2);
      opacity: 0;
      transition: opacity .4s ease, transform .4s ease;
      pointer-events: none;
    }
    #exhibit-badge.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #badge-num { font-size: .6rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--gold); margin-bottom: .2rem; }
    #badge-name { font-size: .95rem; font-weight: 700; color: var(--text); }
    #badge-audio-icon { display: flex; align-items: center; justify-content: center; gap: .3rem; margin-top: .35rem; font-size: .62rem; font-weight: 500; color: var(--text-2); }
    #badge-audio-icon svg { width: 11px; height: 11px; color: var(--gold); }

    #overlay {
      position: fixed; inset: 0; z-index: 9995;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem;
      transition: opacity .5s ease;
    }
    #overlay.hiding { opacity: 0; pointer-events: none; }

    .overlay-logo { width: 60px; height: 60px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(179,139,36,.4); }
    .overlay-eyebrow { font-size: .65rem; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: var(--gold); margin-bottom: .6rem; }
    .overlay-title { font-size: clamp(1.5rem, 5vw, 2.2rem); font-weight: 800; color: var(--text); text-align: center; line-height: 1.2; margin-bottom: .75rem; }
    .overlay-exhibit-name { font-size: clamp(1rem, 3vw, 1.3rem); font-weight: 500; color: var(--text-2); text-align: center; margin-bottom: 2.5rem; max-width: 320px; line-height: 1.4; }
    .overlay-instruction { background: var(--white); border: 1.5px solid #e4ddd3; border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 2rem; max-width: 320px; width: 100%; display: flex; flex-direction: column; gap: .65rem; }
    .instr-row { display: flex; align-items: center; gap: .75rem; }
    .instr-num { width: 26px; height: 26px; border-radius: 50%; background: var(--gold-pale); border: 1.5px solid rgba(179,139,36,.3); color: var(--gold); font-size: .72rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .instr-text { font-size: .8rem; font-weight: 500; color: var(--text-2); line-height: 1.35; }

    #btn-start {
      width: 100%; max-width: 320px;
      display: flex; align-items: center; justify-content: center; gap: .65rem;
      background: var(--gold); color: #fff;
      font-family: 'Manrope', sans-serif;
      font-size: 1rem; font-weight: 700;
      padding: 1rem 2rem; border-radius: 50px; border: none; cursor: pointer;
      box-shadow: 0 6px 24px rgba(179,139,36,.45);
    }
    #btn-start svg { width: 20px; height: 20px; }

    #error-screen {
      position: fixed; inset: 0; z-index: 9998;
      background: var(--bg); display: none;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem; text-align: center; gap: 1rem;
    }
    #error-screen.visible { display: flex; }
    #error-screen h2 { font-size: 1.4rem; font-weight: 700; color: var(--text); }
    #error-screen p { font-size: .9rem; color: var(--text-2); max-width: 300px; line-height: 1.6; }
    .btn-error-back { display: inline-flex; align-items: center; gap: .45rem; background: var(--white); border: 1.5px solid #e4ddd3; color: var(--text-2); font-family: 'Manrope', sans-serif; font-size: .82rem; font-weight: 600; padding: .6rem 1.2rem; border-radius: 30px; cursor: pointer; text-decoration: none; margin-top: .5rem; }

    /* ── DEBUG LOG ── */
    #debug-log {
      position: fixed;
      bottom: 80px; left: 8px; right: 8px;
      z-index: 9999;
      background: rgba(0,0,0,.82);
      color: #00ff88;
      font: 11px/1.5 monospace;
      padding: 8px 10px;
      border-radius: 10px;
      max-height: 240px;
      overflow-y: auto;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- A-FRAME SCENE — статична, Mind-AR управляє canvas -->
  <a-scene
    id="ar-scene"
    mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="exhibit-model" src=""></a-asset-item>
    </a-assets>

    <a-light type="ambient"     color="#ffffff" intensity="0.6"></a-light>
    <a-light type="directional" color="#fff8ee" intensity="1.4" position="1 3 2"></a-light>
    <a-light type="directional" color="#ddeeff" intensity="0.4" position="-2 1 -1"></a-light>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
      <!-- Wrapper rotates around Z axis (= vertical in Mind-AR marker space) -->
      <a-entity id="ar-wrapper" rotation="0 0 0">
        <a-gltf-model
          id="ar-model"
          src="#exhibit-model"
          rotation="0 0 0"
          position="0 0 0.05"
          scale="0.15 0.15 0.15"
        ></a-gltf-model>
      </a-entity>
    </a-entity>
  </a-scene>

  <!-- ERROR -->
  <div id="error-screen">
    <div style="font-size:3rem">⚠️</div>
    <h2>Помилка</h2>
    <p id="error-msg">Експонат не знайдено.</p>
    <a href="index.html" class="btn-error-back">← Повернутись до колекції</a>
  </div>

  <!-- OVERLAY -->
  <div id="overlay">
    <div class="overlay-logo">🪆</div>
    <p class="overlay-eyebrow">Доповнена реальність</p>
    <h1 class="overlay-title">AR-перегляд</h1>
    <p class="overlay-exhibit-name" id="overlay-exhibit-name">Завантаження…</p>
    <div class="overlay-instruction">
      <div class="instr-row"><span class="instr-num">1</span><span class="instr-text">Дозвольте доступ до камери</span></div>
      <div class="instr-row"><span class="instr-num">2</span><span class="instr-text">Наведіть камеру на листівку експоната</span></div>
      <div class="instr-row"><span class="instr-num">3</span><span class="instr-text">Дочекайтесь появи 3D-моделі та звуку</span></div>
    </div>
    <button id="btn-start">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
      </svg>
      Запустити AR
    </button>
  </div>

  <!-- BACK -->
  <a href="index.html" id="btn-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Назад
  </a>

  <!-- BADGE -->
  <div id="exhibit-badge">
    <p id="badge-num"></p>
    <p id="badge-name"></p>
    <div id="badge-audio-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
      Аудіогід відтворюється
    </div>
  </div>

  <!-- AUDIO -->
  <audio id="ar-audio" loop preload="auto">
    <source id="ar-audio-src" src="" type="audio/mpeg" />
  </audio>

  <!-- DEBUG LOG -->
  <div id="debug-log"></div>

  <script>
    // ── Debug helper ──────────────────────────────
    function log(msg) {
      const el = document.getElementById('debug-log');
      const line = document.createElement('div');
      line.textContent = new Date().toISOString().slice(11, 19) + '  ' + msg;
      el.appendChild(line);
      el.scrollTop = el.scrollHeight;
      console.log('[AR]', msg);
    }
    window.addEventListener('error', ev => log('JS ERROR: ' + ev.message));

    // ── 1. Exhibit from URL ───────────────────────
    const rawId = new URLSearchParams(window.location.search).get('id');
    log('page loaded, id=' + rawId);

    const exhibit = (exhibitsData || []).find(e => String(e.id) === String(rawId));
    log('exhibit found: ' + (exhibit ? exhibit.name : 'NO'));

    function showError(msg) {
      document.getElementById('overlay').style.display = 'none';
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-screen').classList.add('visible');
    }

    if (!rawId || !exhibit) {
      showError('Експонат не знайдено. Перевірте посилання.');
    } else {
      initData();
    }

    // ── 2. Inject data into static scene ─────────
    function initData() {
      const idx         = exhibitsData.indexOf(exhibit);
      const targetIndex = exhibit.targetIndex !== undefined ? exhibit.targetIndex : idx;
      log('targetIndex=' + targetIndex + ', modelUrl=' + exhibit.modelUrl);

      document.getElementById('overlay-exhibit-name').textContent = exhibit.name;
      document.getElementById('badge-num').textContent = 'Експонат № ' + String(idx + 1).padStart(2, '0');
      document.getElementById('badge-name').textContent = exhibit.name;

      document.getElementById('ar-audio-src').src = exhibit.audioUrl || '';
      document.getElementById('ar-audio').load();

      document.getElementById('exhibit-model').setAttribute('src', exhibit.modelUrl || '');
      document.getElementById('ar-target').setAttribute('mindar-image-target', 'targetIndex: ' + targetIndex);
    }

    // AR positioning — applied after scene loaded so A-Frame doesn't override
    function applyARPositioning() {
      const model   = document.getElementById('ar-model');
      const wrapper = document.getElementById('ar-wrapper');
      const scale    = exhibit.arScale    || '0.15 0.15 0.15';
      const position = exhibit.arPosition || '0 0 0.05';
      const rotation = exhibit.arRotation || '-90 0 0';  // tilt only, no spin

      // Model gets scale, position and tilt (X rotation for Mind-AR coordinate fix)
      model.setAttribute('scale',    scale);
      model.setAttribute('position', position);
      model.setAttribute('rotation', rotation);
      model.removeAttribute('animation');

      // Wrapper spins around Z axis — this is the vertical axis in Mind-AR marker space
      wrapper.setAttribute('rotation', '0 0 0');
      wrapper.setAttribute('animation',
        'property: rotation; from: 0 0 0; to: 0 0 360; loop: true; dur: 8000; easing: linear'
      );

      log('AR positioning applied: scale=' + scale + ' rot=' + rotation);
    }

    // ── 3. Scene & AR events ──────────────────────
    const scene   = document.getElementById('ar-scene');
    const audioEl = document.getElementById('ar-audio');
    const badge   = document.getElementById('exhibit-badge');

    scene.addEventListener('loaded', () => {
      log('a-scene loaded');
      log('mindar-image-system exists: ' + !!(scene.systems && scene.systems['mindar-image-system']));

      // Apply AR positioning now that A-Frame components are fully initialised
      if (exhibit) applyARPositioning();

      const target = document.getElementById('ar-target');
      target.addEventListener('targetFound', () => {
        log('targetFound!');
        audioEl.play().catch(e => log('audio play error: ' + e));
        badge.classList.add('visible');
      });
      target.addEventListener('targetLost', () => {
        log('targetLost');
        audioEl.pause();
        badge.classList.remove('visible');
      });
    });

    scene.addEventListener('arError', e => log('arError: ' + JSON.stringify(e.detail)));

    // ── 4. Start button ───────────────────────────
    document.getElementById('btn-start').addEventListener('click', () => {
      log('btn-start clicked');

      audioEl.play().then(() => {
        audioEl.pause();
        audioEl.currentTime = 0;
        log('audio context unlocked');
      }).catch(e => log('audio unlock failed: ' + e));

      const overlay = document.getElementById('overlay');
      overlay.classList.add('hiding');
      setTimeout(() => { overlay.style.display = 'none'; }, 500);

      document.getElementById('btn-back').style.display = 'flex';

      const sys = scene.systems && scene.systems['mindar-image-system'];
      log('system at click time: ' + !!sys);

      if (sys) {
        log('calling start()');
        sys.start();
      } else {
        log('waiting for loaded event to call start()');
        scene.addEventListener('loaded', () => {
          log('loaded fired, calling start()');
          scene.systems['mindar-image-system'].start();
        }, { once: true });
      }
    });

    // ── 5. Back button ────────────────────────────
    document.getElementById('btn-back').addEventListener('click', (e) => {
      e.preventDefault();
      audioEl.pause();
      const sys = scene.systems && scene.systems['mindar-image-system'];
      if (sys) sys.stop();
      const id = new URLSearchParams(window.location.search).get('id');
      window.location.href = id ? 'index.html?id=' + id : 'index.html';
    });
  </script>
</body>
</html>
